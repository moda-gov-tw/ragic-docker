<html>
<head>
  <title></title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <link rel="stylesheet" type="text/css" href="../css/normalize.css" />
  <link rel="stylesheet" type="text/css" href="default.css" />
</head>
<body style="overflow-y:hidden;">

<table>

  <tr>
    <td style="vertical-align: top;width:180px;">
      <div style="width:100%;height:30px;border-bottom:1px solid #dbdbdb;">
        <a style="text-decoration: none;" href="/">
        <div style="margin:15px 0 0 12px;font-size:18px;">
          <span style="color:#ca0000;font-weight:bold;">NowBooked</span>
          <span style="color:#999;font-weight:bold;margin-left:-5px;">.com</span>
        </div></a>
      </div>
      <div id="datepicker"></div>
      <textarea id="debug" style="width:100%;font-size:10px;" rows="10"></textarea>
    </td>
    <td>
      <div id="calnext" style="float:left;margin:5px 0 0 150px;">
        <div class="button" style="float:left;margin:0 5px 0 0;" onclick="bookings.caltype.pickerAdd();initBooking();">Today</div>
        <div class="button" onclick="bookings.caltype.pickerAdd(-1);initBooking();" style="min-width:20px;float:left;">&lt;</div><div class="button" onclick="bookings.caltype.pickerAdd(1);initBooking();" style="min-width:20px;float:left;">&gt;</div>
        <div id="thisRange" style="float:left;font-size:12px;margin:8px 12px;"></div>
      </div>
      <div style="float:right;margin:5px 25px 0 0;font-size:12px;">
        <div id="dateformat">
          <div id="formatDaily" class="button" style="float:left;margin:0 5px 0 0;" onclick="setState('format','formatDaily');initBooking();">Day</div>
          <div id="formatMonthly" class="button" style="float:left;margin:0 5px 0 0;" onclick="setState('format','formatMonthly');initBooking();">Month</div>
        </div>
        <a href="javascript:void(0);" style="float:left;margin:8px 12px;" onclick="$('setup').style.display='';builderHelperPanelSwitch(1);">Setup</a>
      </div>
      <div id="calhead"></div>
      <div id="cal"><div id="calsec"></div></div>
    </td>
  </tr>
</table>


<div id="setup" style="width:100%;height:100%;top:0;position:absolute;background:#ffffff;display:none;">
  <div style="margin:25px;">
    <h2 style="margin:12px 0;">Your Nowbooked.com booking space settings:</h2>
    <div id="designPanels" class="clearfix">
      <div id="designHelperMode1" onclick="builderHelperPanelSwitch(1);">Daily</div>
      <div id="designHelperMode2" onclick="builderHelperPanelSwitch(2);">Weekly</div>
      <div id="designHelperMode3" onclick="builderHelperPanelSwitch(3);">Monthly</div>
      <div id="designHelperMode4" onclick="builderHelperPanelSwitch(4);">Yearly</div>
      <div id="designHelperMode5" onclick="builderHelperPanelSwitch(5);">General</div>
    </div>
    <div style="float:left;clear:left;background: #efefef;width:100%;height:500px;border-left:1px solid #aaaaaa;border-bottom:1px solid #aaaaaa;border-right:1px solid #aaaaaa;">
      <div style="margin:5px;float:left;clear:left;">
        <a href="javascript:void(0);" onclick="$('setup').style.display='none';initBooking();" style="font-size:12px;margin:0 12px;">&lt;&lt;Back to booking</a>
        <div class="button" onclick="saveConfig();">Save</div>
        <div class="button" onclick="$('setup').style.display='none';">Cancel</div>
      </div>
      <div id="configCanvas"></div>
    </div>
  </div>
</div>


<div id="info" style="display:none;"><div class="infomain"><div class="infoclose" onclick="bookings.closeInfo();">✕</div>
  <table class="infotable">
    <tr>
      <th>When:</th>
      <td></td>
    </tr>
    <tr>
      <th>Who:</th>
      <td><input id="infowho" type="text" class="stdinputtext"></td>
    </tr>
    <tr>
      <th>Purpose:</th>
      <td><input id="infowhat" type="text" class="stdinputtext"></td>
    </tr>
    <tr>
      <th>E-mail:</th>
      <td><input id="infoemail" type="text" class="stdinputtext"></td>
    </tr>
    <tr>
      <th>Phone:</th>
      <td><input id="infophone" type="text" class="stdinputtext"></td>
    </tr>
  </table>
  <div class="actions">
    <div class="button" onclick="bookings.doAddInfo();">Save</div>
    <a href="javascript:bookings.deleteBooking(drag.updatingSid);" style="float:right;font-size:12px;color:#08c;margin:8px 18px 0 0;">Delete</a>
  </div>
</div></div>

<script>
  var apname='ragic';
</script>

<script src="calpick.js"></script>
<script src="cal.js"></script>
<script src="caldaily.js"></script>
<script src="calmonthly.js"></script>
<script src="rules.js"></script>
<script src="book.js"></script>
<script src="util.js"></script>
<script>

  var bookings=null;
  initBooking();

</script>
</body>
</html>
