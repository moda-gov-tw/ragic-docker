<html>

    <body>
        <form id="redirect_form" method="POST" action="https://www.ragic.com/sims/aws/fulfillment.jsp" target="_top" >
            <input id="customerIdentifier" type="hidden" name="customerIdentifier" value="temp-id">
        </form>

        <script>
            let url = new URL(window.location.href);
            if(url.hostname==='localhost') document.getElementById('redirect_form').action = "https://localhost/sims/aws/fulfillment.jsp";
            else if(url.hostname==='test1.ragic.com') document.getElementById('redirect_form').action = "https://test1.ragic.com/sims/aws/fulfillment.jsp";
            else document.getElementById('redirect_form').action = "https://www.ragic.com/sims/aws/fulfillment.jsp";
            
            document.getElementById('customerIdentifier').value = url.searchParams.get('id');
            document.getElementById('redirect_form').submit();
        </script>
    </body>


</html>
